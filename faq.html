<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <title>أسئلة ومعلومات — قاعدة بيانات القرآن الكريم</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .faq-wrap { padding: 25px; }
        .faq-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .faq-q {
            padding: 16px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-weight: 600;
            color: var(--text-main);
            transition: background var(--speed);
        }
        .faq-q:hover { background: var(--bg-surface-alt); }
        .faq-q .chev { transition: transform var(--speed); color: var(--color-info); }
        .faq-item.open .chev { transform: rotate(180deg); }
        .faq-a {
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--speed) ease, padding var(--speed) ease;
            padding: 0 18px;
            color: var(--text-muted);
            line-height: 1.95;
        }
        .faq-item.open .faq-a { max-height: 320px; padding: 0 18px 16px; }
        .faq-q .q-icon { color: var(--color-info); margin-left: 6px; }
        .section-title { padding: 6px 25px 0; color: var(--text-main); font-size: 1.15rem; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1><i class="fa-solid fa-circle-question"></i> أسئلة ومعلومات</h1>
                <p class="subtitle">كل ما تريد معرفته عن قاعدة بيانات القرآن الكريم</p>
                <nav class="header-links">
                    <a href="index.html"><i class="fa-solid fa-table"></i> الجدول</a>
                    <a href="stats.html"><i class="fa-solid fa-chart-pie"></i> الإحصائيات</a>
                    <a href="quiz.html"><i class="fa-solid fa-trophy"></i> المسابقة</a>
                    <a href="https://github.com/Alhlhli/Quran-Database" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i> GitHub</a>
                </nav>
            </div>
        </header>

        <!-- معلومات سريعة (محسوبة من البيانات) -->
        <section class="statistics" id="quickInfo"></section>

        <h2 class="section-title"><i class="fa-solid fa-comments"></i> الأسئلة الشائعة</h2>
        <div class="faq-wrap" id="faqList"></div>
    </div>

    <script>
    // تطبيق سمة الوضع الليلي المحفوظة
    (function () {
        try {
            const s = JSON.parse(localStorage.getItem('quranSettings') || '{}');
            document.documentElement.setAttribute('data-theme', s.theme || 'light');
        } catch (e) {}
    })();

    const FAQ = [
        ['ما هذا الموقع؟', 'قاعدة بيانات تفاعلية تعرض جميع سور القرآن الكريم الـ114 مع 27 حقلًا من المعلومات والإحصائيات لكل سورة، قابلة للبحث والفرز والتصفية والتصدير.'],
        ['ما رواية النص المعتمدة؟', 'جميع البيانات وفق رواية حفص عن عاصم، وهي الرواية الأكثر انتشارًا في العالم الإسلامي.'],
        ['ما الفرق بين السور المكية والمدنية؟', 'المكية ما نزل قبل هجرة النبي ﷺ إلى المدينة، والمدنية ما نزل بعدها. في هذه القاعدة 86 سورة مكية و28 مدنية.'],
        ['ما المقصود بـ«الحروف المقطعة»؟', 'هي حروف تبدأ بها بعض السور مثل (الم، الر، حم...) وتُعرف بفواتح السور، وعددها وتشكيلاتها من إعجاز القرآن.'],
        ['كم عدد سجدات التلاوة؟', 'سجدات التلاوة مواضع يُسنّ السجود عند تلاوتها، وعمود «السجدات» يبيّن وجودها في كل سورة.'],
        ['كيف أبحث وأصفّي البيانات؟', 'اكتب في صندوق البحث للبحث في الأسماء والأنبياء والأسماء الحسنى. انقر عنوان أي عمود للترتيب، واضغط أيقونة ▼ بجانب العنوان لاختيار قيمة محددة للتصفية.'],
        ['كيف أخصّص الأعمدة الظاهرة؟', 'من زر «الإعدادات» يمكنك اختيار الأعمدة التي تريد إظهارها لتقليل الازدحام، وضبط الوضع الليلي وحجم الخط وكثافة الجدول.'],
        ['كيف أصدّر البيانات؟', 'استخدم زرّي «Excel» و«CSV» في الأعلى لتنزيل كامل البيانات بصيغة جدول جاهزة للاستخدام.'],
        ['هل يعمل الموقع دون إنترنت؟', 'نعم، التطبيق يدعم تقنية PWA؛ بعد أول زيارة يمكن تثبيته على الجهاز واستخدامه دون اتصال.'],
        ['ما مصدر الكود وهل يمكنني المساهمة؟', 'المشروع مفتوح المصدر على GitHub، ويمكنك فتح Issue أو إرسال Pull Request للمساهمة في تطويره.'],
    ];

    function renderFaq() {
        document.getElementById('faqList').innerHTML = FAQ.map(([q, a]) => `
            <div class="faq-item">
                <div class="faq-q"><span><i class="fa-solid fa-circle-question q-icon"></i> ${q}</span><i class="fa-solid fa-chevron-down chev"></i></div>
                <div class="faq-a">${a}</div>
            </div>`).join('');
        document.querySelectorAll('.faq-q').forEach(q =>
            q.addEventListener('click', () => q.parentElement.classList.toggle('open')));
    }

    async function renderInfo() {
        try {
            const res = await fetch('quran-data.json');
            const d = await res.json();
            const surahs = Array.isArray(d.surahs) ? d.surahs
                : d.data.map(r => Object.fromEntries(d.columns.map((c, i) => [c, r[i]])));
            const sum = k => surahs.reduce((a, s) => a + (typeof s[k] === 'number' ? s[k] : 0), 0);
            const cards = [
                ['fa-book-quran', surahs.length, 'سورة'],
                ['fa-kaaba', surahs.filter(s => s.type === 'مكية').length, 'مكية'],
                ['fa-moon', surahs.filter(s => s.type === 'مدنية').length, 'مدنية'],
                ['fa-list-ol', sum('verses').toLocaleString('en-US'), 'آية'],
                ['fa-font', sum('words').toLocaleString('en-US'), 'كلمة'],
                ['fa-person-praying', sum('sajdahs'), 'سجدة'],
            ];
            document.getElementById('quickInfo').innerHTML = cards.map(([i, n, l]) =>
                `<div class="stat-card"><div class="stat-icon"><i class="fa-solid ${i}"></i></div><div class="stat-number">${n}</div><div class="stat-label">${l}</div></div>`).join('');
        } catch (e) {
            document.getElementById('quickInfo').style.display = 'none';
        }
    }

    renderFaq();
    renderInfo();
    </script>
</body>
</html>
