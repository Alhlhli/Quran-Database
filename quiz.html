<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <title>المسابقة — قاعدة بيانات القرآن الكريم</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .quiz-wrap { padding: 25px; max-width: 820px; margin: 0 auto; }

        /* اختيار المستوى */
        .levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 18px 0; }
        .level-card {
            background: var(--bg-surface); border: 2px solid var(--border-soft);
            border-radius: var(--radius-md); padding: 20px 12px; text-align: center;
            cursor: pointer; transition: all var(--speed); box-shadow: var(--shadow-sm);
        }
        .level-card:hover { transform: translateY(-3px); }
        .level-card.selected { border-color: var(--color-info); box-shadow: 0 0 0 3px rgba(52,152,219,.2); }
        .level-card .lc-icon { font-size: 1.8rem; margin-bottom: 8px; color: var(--color-info); }
        .level-card h3 { color: var(--text-main); margin-bottom: 4px; }
        .level-card p { color: var(--text-muted); font-size: .8rem; }

        .start-row { display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
        .best-scores { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
        .best-chip { background: var(--bg-surface-alt); color: var(--text-main); padding: 6px 14px; border-radius: var(--radius-pill); font-size: .85rem; }
        .best-chip i { color: var(--color-gold); }

        /* شاشة السؤال */
        .quiz-card { background: var(--bg-surface); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: 22px; }
        .q-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: var(--text-muted); font-size: .9rem; flex-wrap: wrap; gap: 8px; }
        .q-head .q-score { color: var(--color-info); font-weight: bold; }
        .q-level-tag { background: var(--color-info); color: #fff; padding: 3px 12px; border-radius: var(--radius-pill); font-size: .78rem; }
        .q-bar-track { height: 6px; background: var(--border-soft); border-radius: var(--radius-pill); overflow: hidden; margin-bottom: 18px; }
        .q-bar { height: 100%; width: 0; background: linear-gradient(90deg,#667eea,#764ba2); transition: width var(--speed); }
        .q-text { font-size: 1.25rem; font-weight: 600; color: var(--text-main); line-height: 1.8; margin-bottom: 18px; }
        .q-options { display: grid; gap: 10px; }
        .q-option {
            text-align: right; padding: 14px 18px; border: 2px solid var(--border-soft);
            background: var(--bg-surface-alt); color: var(--text-main); border-radius: var(--radius-sm);
            font-size: 1rem; cursor: pointer; transition: all var(--speed);
        }
        .q-option:hover:not(.disabled) { border-color: var(--color-info); transform: translateX(-3px); }
        .q-option.disabled { cursor: default; }
        .q-option.correct { border-color: var(--color-accent); background: rgba(39,174,96,.15); font-weight: bold; }
        .q-option.wrong { border-color: #e74c3c; background: rgba(231,76,60,.12); }
        .q-feedback { margin-top: 16px; padding: 0; font-size: .95rem; line-height: 1.8; }
        .q-feedback.ok { color: var(--color-accent); }
        .q-feedback.bad { color: #e74c3c; }
        .q-actions { margin-top: 18px; text-align: center; }

        /* شاشة النتيجة */
        .result-card { background: var(--bg-surface); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: 34px 24px; text-align: center; }
        .result-icon { font-size: 3.4rem; color: var(--color-gold); margin-bottom: 12px; }
        .result-score { font-size: 3rem; font-weight: bold; color: var(--color-info); margin: 8px 0; }
        .result-score small { font-size: 1rem; color: var(--text-muted); font-weight: normal; }
        .result-msg { font-size: 1.2rem; color: var(--text-main); margin-bottom: 8px; }
        .result-detail { color: var(--text-muted); margin-bottom: 10px; }
        .result-best { color: var(--text-main); margin-bottom: 20px; font-size: .95rem; }
        .result-best i { color: var(--color-gold); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1><i class="fa-solid fa-trophy"></i> مسابقة القرآن الكريم</h1>
                <p class="subtitle">اختبر معلوماتك — أسئلة ذكية من قاعدة البيانات نفسها</p>
                <nav class="header-links">
                    <a href="index.html"><i class="fa-solid fa-table"></i> الجدول</a>
                    <a href="stats.html"><i class="fa-solid fa-chart-pie"></i> الإحصائيات</a>
                    <a href="faq.html"><i class="fa-solid fa-circle-question"></i> أسئلة ومعلومات</a>
                </nav>
            </div>
        </header>

        <div class="quiz-wrap">

            <!-- شاشة البداية -->
            <section id="startScreen">
                <h2 style="text-align:center;color:var(--text-main);margin-bottom:6px;">اختر مستواك وعدد الأسئلة</h2>
                <p style="text-align:center;color:var(--text-muted);">كل الأسئلة منوّعة وتُولَّد من بيانات السور الـ114</p>

                <div class="levels">
                    <div class="level-card selected" data-level="مبتدئ">
                        <div class="lc-icon"><i class="fa-solid fa-seedling"></i></div>
                        <h3>مبتدئ</h3><p>أسئلة أساسية (10 نقاط/سؤال)</p>
                    </div>
                    <div class="level-card" data-level="متوسط">
                        <div class="lc-icon"><i class="fa-solid fa-fire"></i></div>
                        <h3>متوسط</h3><p>أسئلة أعمق (15 نقطة/سؤال)</p>
                    </div>
                    <div class="level-card" data-level="متقدم">
                        <div class="lc-icon"><i class="fa-solid fa-brain"></i></div>
                        <h3>متقدم</h3><p>تحدٍّ للخبراء (20 نقطة/سؤال)</p>
                    </div>
                </div>

                <div class="start-row">
                    <label for="amountSelect" style="color:var(--text-main);">عدد الأسئلة:</label>
                    <select class="select-input" id="amountSelect"></select>
                    <button class="btn btn-primary" id="startBtn"><i class="fa-solid fa-play"></i> ابدأ المسابقة</button>
                </div>

                <div class="best-scores" id="bestScores"></div>
            </section>

            <!-- شاشة السؤال -->
            <section id="quizScreen" style="display:none;">
                <div class="quiz-card">
                    <div class="q-head">
                        <span id="qProgress"></span>
                        <span class="q-level-tag" id="qLevelTag"></span>
                        <span class="q-score" id="qScore"></span>
                    </div>
                    <div class="q-bar-track"><div class="q-bar" id="qBar"></div></div>
                    <div class="q-text" id="qText"></div>
                    <div class="q-options" id="qOptions"></div>
                    <div class="q-feedback" id="qFeedback"></div>
                    <div class="q-actions">
                        <button class="btn btn-primary" id="nextBtn" style="display:none;"><i class="fa-solid fa-arrow-left"></i> التالي</button>
                    </div>
                </div>
            </section>

            <!-- شاشة النتيجة -->
            <section id="resultScreen" style="display:none;">
                <div class="result-card">
                    <div class="result-icon" id="resultIcon"></div>
                    <div class="result-msg" id="resultMsg"></div>
                    <div class="result-score" id="resultScore"></div>
                    <div class="result-detail" id="resultDetail"></div>
                    <div class="result-best" id="resultBest"></div>
                    <button class="btn btn-primary" id="retryBtn"><i class="fa-solid fa-rotate-right"></i> مسابقة جديدة</button>
                </div>
            </section>

        </div>
    </div>
</body>
<script src="quiz.js" defer></script>    
</html>
