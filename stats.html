<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <title>إحصائيات القرآن الكريم — رسوم بيانية</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
    <script src="stats.js" defer></script>
    <style>
        .charts-grid {
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 22px;
        }
        .chart-card {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            padding: 18px;
        }
        .chart-card h3 {
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-card h3 i { color: var(--color-info); }
        .chart-wrap { position: relative; height: 300px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1><i class="fa-solid fa-chart-pie"></i> إحصائيات القرآن الكريم</h1>
                <p class="subtitle">تمثيل بياني شامل لبيانات السور الـ114</p>
                <nav class="header-links">
                    <a href="index.html"><i class="fa-solid fa-table"></i> الجدول</a>
                    <a href="quiz.html"><i class="fa-solid fa-trophy"></i> المسابقة</a>
                    <a href="faq.html"><i class="fa-solid fa-circle-question"></i> أسئلة ومعلومات</a>
                    <a href="https://github.com/Alhlhli/Quran-Database" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i> GitHub</a>
                </nav>
            </div>
        </header>

        <section class="statistics" id="summaryCards"></section>
        <section class="charts-grid" id="chartsGrid"></section>
    </div>
</body>
</html>
